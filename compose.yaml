  sql:
    image: mysql:8.0
    container_name: sql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      SCREEN_USER: ${SCREEN_USER}
      SCREEN_PASSWORD: ${SCREEN_PASSWORD}
      SENSOR_USER: ${SENSOR_USER}
      SENSOR_PASSWORD: ${SENSOR_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
    - ./sql/init.sh:/docker-entrypoint-initdb.d/init.sh
    networks:
      - apache_network

  screen:
    build:
      context: ./screen
      dockerfile: Dockerfile
    image: screen
    container_name: screen
    restart: unless-stopped
    environment:
      SCREEN_USER: ${SCREEN_USER}
      SCREEN_PASSWORD: ${SCREEN_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    depends_on:
      sql:
        condition: service_healthy
    networks:
      - apache_network

