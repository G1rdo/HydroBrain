  adc-sensor:
    build:
      context: ./adc-sensor
      dockerfile: Dockerfile
    image: adc-sensor
    container_name: adc-sensor
    restart: unless-stopped
    environment:
#      BLINKA_RASPBERRYPI: 1
      SENSOR_USER: ${SENSOR_USER}
      SENSOR_PASSWORD: ${SENSOR_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    devices:
      - "/dev/i2c-1:/dev/i2c-1"
    privileged: true
#    volumes:
